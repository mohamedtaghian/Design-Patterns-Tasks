<main class="flex flex-col justify-center items-center gap-2.5 bg-slate-300 min-h-screen">
  <button
    class="bg-black hover:bg-black/80 px-4 py-2 rounded-lg text-white transition-colors duration-300 cursor-pointer"
    (click)="loadData()"
  >
    Fetch Heavy Data
  </button>
  <button
    class="bg-black hover:bg-black/80 px-4 py-2 rounded-lg text-white transition-colors duration-300 cursor-pointer"
    (click)="runCalculation()"
  >
    Run Sync Calculation
  </button>
</main>
